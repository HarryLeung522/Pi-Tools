<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi tools</title>
    <style>
        /* --- 基礎設定 --- */
        :root {
            --sidebar-width: 280px;
            --deep-blue: #003366;
            --bg-gray: #f8f9fa;
        }

        body {
            display: flex;
            margin: 0;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* --- 左側側邊欄 --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-gray);
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease; /* 平滑收合動畫 */
            flex-shrink: 0;
            z-index: 1000;
        }

        /* 當側邊欄收合時的狀態 (桌面版) */
        .sidebar.collapsed {
            margin-left: calc(var(--sidebar-width) * -1);
        }

        .sidebar-content {
            padding: 20px 15px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* 標題與 Logo 區塊 */
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            margin-bottom: 25px;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box img {
            width: 32px;
            height: auto;
        }

        .logo-box h1 {
            font-size: 22px;
            color: #1a1a1a;
            margin: 0;
        }

        /* 收合按鈕 (桌面) */
        .toggle-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
            padding: 5px;
            border-radius: 4px;
        }
        .toggle-btn:hover { background-color: #e9ecef; }

        /* 分類標題 (深藍色、大字體、底線) */
        .category-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--deep-blue);
            margin-top: 25px;
            margin-bottom: 10px;
            padding-left: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--deep-blue);
        }

        /* 工具連結連結 */
        .sidebar a {
            display: block;
            padding: 10px 12px;
            color: #333;
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 4px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background-color: #e9ecef;
            color: var(--deep-blue);
            font-weight: 500;
        }

        /* --- 右側內容區 --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 桌面版隱藏時出現的浮動開啟按鈕 */
        .floating-open-btn {
            position: absolute;
            left: 10px;
            top: 10px;
            z-index: 99;
            background: var(--bg-gray);
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            display: none; /* 預設隱藏 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .content-frame {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        /* --- 手機版適應 --- */
        .mobile-top-bar {
            display: none;
            background: var(--bg-gray);
            padding: 10px 15px;
            border-bottom: 1px solid #ddd;
            align-items: center;
            justify-content: space-between;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                margin-left: 0;
                transform: translateX(-100%);
            }
            .sidebar.active { transform: translateX(0); }
            .mobile-top-bar { display: flex; }
            .toggle-btn.desktop-only { display: none; }
            .floating-open-btn { display: none !important; }
        }

        /* 遮罩 */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }
        .overlay.active { display: block; }

    </style>
</head>
<body>

    <div class="mobile-top-bar">
        <div class="logo-box">
            <img src="logo.png" alt="logo">
            <h1>Pi tools</h1>
        </div>
        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <div class="logo-box">
                    <img src="logo.png" alt="logo">
                    <h1>Pi tools</h1>
                </div>
                <button class="toggle-btn desktop-only" onclick="toggleSidebar()">◀</button>
            </div>

            <div class="category-title">Tutor & Course Management</div>
            <a href="pi timetable.html" target="viewer">Pi Timetable</a>
            <a href="tutor dashboard.html" target="viewer">Tutor Dashboard</a>
            <a href="tutor reminder.html" target="viewer">Tutor Reminder</a>
            <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vQFFF43IJhu4qgR8KiR_Oo9lwv7LkuTcjHzebpTvUd-SnnivG_5GwDT3-JzEncLTxKXbZuQ8LnU90n3/pubhtml" target="viewer">課程總匯.GS</a>

            <div class="category-title">Accounting</div>
            <a href="red 4.0.html" target="viewer">Red 4.0</a>
            <a href="red simpified.html" target="viewer">Red Simplified</a>

            <div class="category-title">Leadership</div>
            <a href="mission board.html" target="viewer">Mission Board</a>
            <a href="mission dashboard.html" target="viewer">Mission Dashboard</a>
            <a href="mission delivery.html" target="viewer">Mission Delivery</a>
            <a href="one on one meeting form.html" target="viewer">1-on-1 Meeting Form</a>
        </div>
    </div>

    <div class="main-content">
        <button class="floating-open-btn" id="openBtn" onclick="toggleSidebar()">☰ 選單</button>
        <iframe src="pi timetable.html" name="viewer" class="content-frame"></iframe>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const openBtn = document.getElementById('openBtn');
            const isMobile = window.innerWidth <= 768;

            if (isMobile) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            } else {
                sidebar.classList.toggle('collapsed');
                // 控制桌面版浮動按鈕顯示
                if (sidebar.classList.contains('collapsed')) {
                    openBtn.style.display = 'block';
                } else {
                    openBtn.style.display = 'none';
                }
            }
        }

        // 點擊連結後，如果是手機版則自動收合
        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) toggleSidebar();
            });
        });
    </script>

</body>
</html>
