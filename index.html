<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi tools</title>
    <style>
        /* 基本版面設定 */
        body {
            display: flex;
            margin: 0;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* --- 手機版頂部導覽列 --- */
        .mobile-header {
            display: none;
            background-color: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            padding: 10px 15px;
            align-items: center;
            justify-content: space-between;
            
            /* 【修復重點1】確保頂部導覽列永遠在 iframe 之上 */
            position: relative;
            z-index: 500; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .mobile-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mobile-header img {
            width: 28px;
            height: auto;
        }

        .mobile-header h1 {
            font-size: 20px;
            color: #1a1a1a;
            margin: 0;
        }

        /* 【修復重點2】加大按鈕點擊範圍，提升手機觸控靈敏度 */
        .menu-btn {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: #333;
            padding: 10px 15px;
            margin: -10px -15px -10px 0; /* 視覺位置不變，但觸控範圍變大 */
            touch-action: manipulation; /* 停用點擊延遲 */
        }

        /* --- 左側選單樣式 --- */
        .sidebar {
            width: 260px;
            background-color: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            padding: 20px 15px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* 讓滑動動畫更滑順 */
            position: relative;
            z-index: 1000;
        }

        .sidebar-header h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 25px;
            padding-left: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-header h1 img {
            width: 32px;
            height: auto;
        }
        
        .close-btn {
            display: none;
            background: none;
            border: none;
            font-size: 32px;
            cursor: pointer;
            color: #666;
            position: absolute;
            top: 10px;
            right: 15px;
            padding: 10px;
            touch-action: manipulation;
        }

        .category-title {
            font-size: 16px;
            font-weight: bold;
            color: #003366;
            margin-top: 25px;
            margin-bottom: 10px;
            padding-left: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #003366;
        }

        .sidebar a {
            display: block;
            padding: 12px 10px; /* 稍微再加大一點點距離，防誤觸 */
            color: #333333;
            text-decoration: none;
            font-size: 15px;
            border-radius: 6px;
            margin-bottom: 4px;
            transition: all 0.2s ease;
        }

        .sidebar a:hover, .sidebar a:active {
            background-color: #e9ecef;
            color: #003366;
            font-weight: 500;
        }

        /* --- 右側顯示區塊 --- */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .content-frame {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
        }

        /* --- RWD 手機版設定 --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .mobile-header {
                display: flex;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                box-shadow: 2px 0 15px rgba(0,0,0,0.2);
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .sidebar-header {
                display: none;
            }

            .close-btn {
                display: block;
            }

            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                backdrop-filter: blur(2px); /* 讓背景有微微模糊的高級感 */
            }

            .overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <div class="mobile-header-left">
            <img src="logo.png" alt="Pi tools logo">
            <h1>Pi tools</h1>
        </div>
        <button class="menu-btn" id="menuBtn">☰</button>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <button class="close-btn" id="closeBtn">×</button>
        
        <div class="sidebar-header">
            <h1><img src="logo.png" alt="Pi tools logo"> Pi tools</h1>
        </div>
        
        <div class="category-title">Tutor & Course Management</div>
        <a href="pi timetable.html" target="viewer">Pi Timetable</a>
        <a href="tutor dashboard.html" target="viewer">Tutor Dashboard</a>
        <a href="tutor reminder.html" target="viewer">Tutor Reminder</a>

        <div class="category-title">Accounting</div>
        <a href="red 4.0.html" target="viewer">Red 4.0</a>
        <a href="red simpified.html" target="viewer">Red Simplified</a>

        <div class="category-title">Leadership</div>
        <a href="mission board.html" target="viewer">Mission Board</a>
        <a href="mission dashboard.html" target="viewer">Mission Dashboard</a>
        <a href="mission delivery.html" target="viewer">Mission Delivery</a>
        <a href="one on one meeting form.html" target="viewer">1-on-1 Meeting Form</a>
    </div>

    <div class="content-area">
        <iframe src="pi timetable.html" name="viewer" class="content-frame"></iframe>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const menuBtn = document.getElementById('menuBtn');
            const closeBtn = document.getElementById('closeBtn');
            const links = document.querySelectorAll('.sidebar a');

            // 切換選單狀態的函數
            function toggleMenu() {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            }

            // 將點擊事件綁定到按鈕與遮罩上
            if(menuBtn) menuBtn.addEventListener('click', toggleMenu);
            if(closeBtn) closeBtn.addEventListener('click', toggleMenu);
            if(overlay) overlay.addEventListener('click', toggleMenu);

            // 點擊連結後自動收合選單
            links.forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth <= 768) {
                        toggleMenu();
                    }
                });
            });
        });
    </script>
</body>
</html>
