<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi tools</title>
    <style>
        /* 基本版面設定 */
        body {
            display: flex;
            margin: 0;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
        }

        /* 左側選單樣式 */
        .sidebar {
            width: 260px;
            background-color: #f8f9fa; /* 淺灰色背景 */
            border-right: 1px solid #e0e0e0;
            padding: 20px 15px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        /* 主標題與 Logo 區塊 */
        .sidebar h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 25px;
            padding-left: 10px;
            display: flex;
            align-items: center;
            gap: 12px; /* Logo 與文字的間距 */
        }

        /* Logo 圖片設定 */
        .sidebar h1 img {
            width: 32px; /* 控制 Logo 寬度，可依實際圖片比例微調 */
            height: auto;
        }

        /* 分類標題 (深藍色、大字體) */
        .category-title {
            font-size: 16px; /* 放大字體 */
            font-weight: bold;
            color: #003366; /* 深藍色 */
            margin-top: 25px;
            margin-bottom: 10px;
            padding-left: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #003366; /* 增加底線提升層次感 */
        }

        /* 連結按鈕 */
        .sidebar a {
            display: block;
            padding: 8px 10px;
            color: #333333;
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 4px;
            transition: all 0.2s ease;
        }

        .sidebar a:hover {
            background-color: #e9ecef;
            color: #003366;
            font-weight: 500;
        }

        /* 右側顯示區塊 (iframe) 樣式 */
        .content-frame {
            flex-grow: 1;
            border: none;
            height: 100%;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1><img src="logo.png" alt="Pi tools logo"> Pi tools</h1>
        
        <div class="category-title">Tutor & Course Management</div>
        <a href="pi timetable.html" target="viewer">Pi Timetable</a>
        <a href="tutor dashboard.html" target="viewer">Tutor Dashboard</a>
        <a href="tutor reminder.html" target="viewer">Tutor Reminder</a>

        <div class="category-title">Accounting</div>
        <a href="red 4.0.html" target="viewer">Red 4.0</a>
        <a href="red simpified.html" target="viewer">Red Simplified</a>

        <div class="category-title">Leadership</div>
        <a href="mission board.html" target="viewer">Mission Board</a>
        <a href="mission dashboard.html" target="viewer">Mission Dashboard</a>
        <a href="one on one meeting form.html" target="viewer">1-on-1 Meeting Form</a>
    </div>

    <iframe src="pi timetable.html" name="viewer" class="content-frame"></iframe>

</body>
</html>
