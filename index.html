<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi tools</title>
    <style>
        /* --- 基礎設定 --- */
        :root {
            --sidebar-width: 280px;
            --deep-blue: #003366;
            --bg-gray: #f8f9fa;
        }

        body {
            display: flex;
            margin: 0;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* --- 左側側邊欄 (電腦版) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-gray);
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            flex-shrink: 0;
            z-index: 1000;
        }

        .sidebar.collapsed {
            margin-left: calc(var(--sidebar-width) * -1);
        }

        .sidebar-content {
            padding: 20px 15px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            margin-bottom: 25px;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box img {
            width: 32px;
            height: auto;
        }

        .logo-box h1 {
            font-size: 22px;
            color: #1a1a1a;
            margin: 0;
        }

        .toggle-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
            padding: 5px;
            border-radius: 4px;
        }
        .toggle-btn:hover { background-color: #e9ecef; }

        .category-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--deep-blue);
            margin-top: 25px;
            margin-bottom: 10px;
            padding-left: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--deep-blue);
        }

        .sidebar a {
            display: block;
            padding: 10px 12px;
            color: #333;
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 4px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background-color: #e9ecef;
            color: var(--deep-blue);
            font-weight: 500;
        }

        /* --- 右側內容區 --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .floating-open-btn {
            position: absolute;
            left: 10px;
            top: 10px;
            z-index: 99;
            background: var(--bg-gray);
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .content-frame {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        /* --- 手機版頂部選單 --- */
        .mobile-top-bar {
            display: none;
            background: var(--bg-gray);
            padding: 10px 15px;
            border-bottom: 1px solid #ddd;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1001;
        }

        /* --- RWD 手機版介面 --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .mobile-top-bar { display: flex; }
            .toggle-btn.desktop-only { display: none; }
            .floating-open-btn { display: none !important; }
            .sidebar-header { display: none; }

            .sidebar {
                position: absolute;
                top: 65px;
                right: 15px;
                left: auto;
                width: 260px;
                max-height: calc(100vh - 90px);
                margin-left: 0;
                background-color: #ffffff;
                border: 1px solid #ddd;
                border-radius: 8px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.15);
                opacity: 0;
                visibility: hidden;
                transform: translateY(-10px);
                transition: all 0.2s ease;
            }

            .sidebar.active {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
            }
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }
        .overlay.active { display: block; }

    </style>
</head>
<body>

    <div class="mobile-top-bar">
        <div class="logo-box">
            <img src="logo.png" alt="logo">
            <h1>Pi tools</h1>
        </div>
        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <div class="logo-box">
                    <img src="logo.png" alt="logo">
                    <h1>Pi tools</h1>
                </div>
                <button class="toggle-btn desktop-only" onclick="toggleSidebar()">◀</button>
            </div>

            <div class="category-title">Tutor & Course Management</div>
            <a href="pi timetable.html" target="viewer">Pi Timetable</a>
            <a href="tutor dashboard.html" target="viewer">Tutor Dashboard</a>
            <a href="tutor reminder.html" target="viewer">Tutor Reminder</a>
            <a href="feedback.html" target="viewer">Course Feedback</a>
            <a href="https://docs.google.com/spreadsheets/d/1Pvf0uVyTXVtyRDH0nZeExi_xhbpieq_DYvnNJBwmYGQ/edit?gid=0#gid=0" target="viewer">課程總匯.GS</a>
            <a href="https://docs.google.com/spreadsheets/d/1YAkK2qInSwqIpscbrNBgZzSAlRp0u34BexcYIuEFdIY/edit?gid=0#gid=0" target="viewer">教材總匯.GS</a>

            <div class="category-title">Accounting</div>
            <a href="red 4.0.html" target="viewer">Red 4.0</a>
            <a href="red simpified.html" target="viewer">Red Simplified</a>

            <div class="category-title">Leadership</div>
            <a href="mission board.html" target="viewer">Mission Board</a>
            <a href="mission dashboard.html" target="viewer">Mission Dashboard</a>
            <a href="mission delivery.html" target="viewer">Mission Delivery</a>
            <a href="one on one meeting form.html" target="viewer">1-on-1 Meeting Form</a>
            <a href="https://docs.google.com/spreadsheets/d/1ZHh0QJAFQ3hpmnM_FtN3YLvwV1_Qj7O6Uuv2kiy1m_Y/edit?gid=0#gid=0" target="viewer">Misson.GS</a>
        </div>
    </div>

    <div class="main-content">
        <button class="floating-open-btn" id="openBtn" onclick="toggleSidebar()">☰ 選單</button>
        <iframe src="pi timetable.html" name="viewer" class="content-frame"></iframe>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const openBtn = document.getElementById('openBtn');
            const isMobile = window.innerWidth <= 768;

            if (isMobile) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            } else {
                sidebar.classList.toggle('collapsed');
                if (sidebar.classList.contains('collapsed')) {
                    openBtn.style.display = 'block';
                } else {
                    openBtn.style.display = 'none';
                }
            }
        }

        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    toggleSidebar();
                }
            });
        });
    </script>

</body>
</html>
