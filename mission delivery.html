<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi任務發起區</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background-color: #f4f7f6; color: #333; margin: 0;}
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px;}
    .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 140px; }
    label { font-weight: 600; display: block; margin-bottom: 5px; font-size: 14px; color: #444; }
    input[type="text"], input[type="date"], input[type="number"], select, input[type="file"], textarea { 
      width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px;
    }
    textarea { resize: vertical; min-height: 80px; font-family: inherit; }
    .checkbox-container { display: flex; align-items: center; margin: 20px 0; background: #e8f8f5; padding: 10px; border-radius: 5px; border: 1px solid #d1f2eb;}
    .checkbox-container input { margin-right: 10px; width: 20px; height: 20px; }
    button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;}
    button:hover { background-color: #2980b9; }
    button:disabled { background-color: #95a5a6; }
    .loader { display: none; text-align: center; margin-top: 15px; font-weight: bold; color: #3498db; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Pi任務發起區</h2>
    <form id="taskForm">
      <div class="row">
        <div class="col"><label>任務發起人</label><select id="initiator"><option>Harry</option><option>Zoe</option><option>Ian</option><option>Chris</option></select></div>
        <div class="col"><label>PIC</label><select id="pic"><option>Harry</option><option>Zoe</option><option>Ian</option><option>Chris</option></select></div>
      </div>
      <div class="row">
        <div class="col"><label>Aspect</label><select id="aspect"><option selected>Project Management</option><option>Accounting</option><option>Admin</option><option>Human Resources</option><option>Research & Development</option><option>Sales & Marketing</option></select></div>
        <div class="col"><label>Project</label><input type="text" id="project" value="NO"></div>
      </div>
      <div class="row"><div class="col"><label>Task <span style="color:red;">*</span></label><input type="text" id="task" required></div></div>
      <div class="row">
        <div class="col"><label>Important</label><select id="important"><option>NO</option><option>YES</option></select></div>
        <div class="col"><label>Urgent</label><select id="urgent"><option>NO</option><option>YES</option></select></div>
      </div>
      
      <div class="row">
        <div class="col"><label>截止日期 (Deadline)</label><input type="date" id="deadline"></div>
        <div class="col"><label>預期時數 (Expected Hour)</label><input type="number" id="expectedHour" step="0.5" placeholder="例如: 2.5"></div>
      </div>

      <div class="row"><div class="col"><label>Background</label><textarea id="background">-</textarea></div></div>
      <div class="row"><div class="col"><label>Description</label><textarea id="description">-</textarea></div></div>
      <div class="row"><div class="col"><label>Key output</label><textarea id="keyOutput">-</textarea></div></div>
      <div class="row"><div class="col"><label>上傳相片 (多選)</label><input type="file" id="fileUpload" multiple></div></div>
      
      <div class="checkbox-container"><input type="checkbox" id="exportDoc"> <label for="exportDoc">同時匯出獨立任務 PDF</label></div>

      <button type="submit" id="submitBtn">傳送任務</button>
      <div id="loader" class="loader">處理中，請稍候...</div>
      <div id="successMsg" style="display:none; color: #27ae60; text-align: center; margin-top:15px; font-weight: bold;">✅ 任務發送成功！</div>
      <div id="errMsg" style="display:none; color: #c0392b; text-align: center; margin-top:15px; font-weight: bold;">❌ 發生錯誤，請重試。</div>
    </form>
  </div>

  <script>
    // ⚠️ 記得把這裡替換成您最新的 Web App URL 喔！
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzgHKheS0WPaYTaTG6OkWYzNdDCEBNuIGDxzOOMNyyBuSf027XFLY-FC5Dj19i-xPaw/exec"; 

    document.getElementById("taskForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const loader = document.getElementById("loader");
      const successMsg = document.getElementById("successMsg");
      const errMsg = document.getElementById("errMsg");

      btn.disabled = true; 
      loader.style.display = "block";
      successMsg.style.display = "none";
      errMsg.style.display = "none";

      const payload = {
        action: "githubFormSubmit",
        initiator: document.getElementById("initiator").value,
        pic: document.getElementById("pic").value,
        aspect: document.getElementById("aspect").value,
        project: document.getElementById("project").value,
        task: document.getElementById("task").value,
        important: document.getElementById("important").value,
        urgent: document.getElementById("urgent").value,
        deadline: document.getElementById("deadline").value,
        expectedHour: document.getElementById("expectedHour").value,
        background: document.getElementById("background").value,
        description: document.getElementById("description").value,
        keyOutput: document.getElementById("keyOutput").value,
        exportDoc: document.getElementById("exportDoc").checked,
        files: []
      };

      const fileInput = document.getElementById("fileUpload");
      if (fileInput.files.length > 0) {
        loader.innerText = `正在讀取 ${fileInput.files.length} 個檔案...`;
        try {
          const filePromises = Array.from(fileInput.files).map(file => {
            return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => resolve({
                base64: reader.result.split(',')[1],
                name: file.name,
                type: file.type || "application/octet-stream"
              });
              reader.onerror = reject;
              reader.readAsDataURL(file);
            });
          });
          payload.files = await Promise.all(filePromises);
        } catch (error) {
          loader.style.display = "none";
          errMsg.style.display = "block";
          errMsg.innerText = "❌ 檔案讀取失敗";
          btn.disabled = false;
          return; // 檔案讀取失敗就提早結束
        }
      }

      loader.innerText = "資料上傳中...";

      // 加入了 Header 防 CORS，並加入了 catch 捕捉錯誤
      fetch(GAS_API_URL, { 
        method: "POST", 
        headers: { "Content-Type": "text/plain;charset=utf-8" }, 
        body: JSON.stringify(payload) 
      })
      .then(res => res.json())
      .then(res => {
        if(res.status === "success") {
          successMsg.style.display = "block";
          document.getElementById("taskForm").reset();
          document.getElementById("project").value = "NO";
        } else { 
          throw new Error(res.message); 
        }
      })
      .catch(error => {
        errMsg.style.display = "block";
        errMsg.innerText = "❌ 系統錯誤：" + error.message;
      })
      .finally(() => { 
        btn.disabled = false; 
        loader.style.display = "none"; 
      });
    });
  </script>
</body>
</html>
